spring:
  application:
    name: url-shortener

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/urlshortener
    username: urlshortener_user
    password: urlshortener_pass
    driver-class-name: org.postgresql.Driver

  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Logging Configuration
logging:
  level:
    root: INFO
    com.ziqfaiz.url_shortener: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG